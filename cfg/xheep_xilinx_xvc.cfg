bindto 0.0.0.0
telnet_port 4444
gdb_port 3333
tcl_port 6666

adapter driver xlnx_axi_xvc
xlnx_axi_xvc dev_addr $XVC_DEV_ADDR

transport select jtag
reset_config none

set CHIPNAME riscv
set TAPNAME  $CHIPNAME.cpu
set IRLEN    5
set IDCODE   0x10001c05

jtag newtap $CHIPNAME cpu -irlen $IRLEN -expected-id $IDCODE

set TARGETNAME riscv0
target create $TARGETNAME riscv -chain-position $TAPNAME -coreid 0

catch {riscv set_ir idcode 0x01}
catch {riscv set_ir dtmcs  0x10}
catch {riscv set_ir dmi    0x11}

catch {riscv set_command_timeout_sec 10}
catch {riscv set_mem_access progbuf abstract}

proc halt_raw {} { halt }
proc resume_raw {} { resume }

init

targets $TARGETNAME
halt

if {[catch {$TARGETNAME arp_examine} err]} {
    echo [format {[OPENOCD] arp_examine failed: %s} $err]
} else {
    echo {[OPENOCD] Target examined successfully...}
}

echo {[OPENOCD] Ready...}
